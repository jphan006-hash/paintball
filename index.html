<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paintball Game</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #333;
            color: white;
            font-family: Arial, sans-serif;
        }
        canvas {
            background-color: #f50000;
            border: 2px solid black;
        }
        #game-container {
            text-align: center;
        }
        #game-stats {
            margin-bottom: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game-stats">
            Ammo: <span id="ammo-count">10</span> | Score: <span id="score-count">0</span> | Health: <span id="health-count">100</span>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
<div class="health-bar-container">
    <div id="health-bar-fill"></div>
</div>
    <div id="tutorial-modal" class="modal">
  <div class="modal-content">
    <span class="close-button">&times;</span>
    <h2>Game Tutorial</h2>
    <p><strong>Controls:</strong></p>
    <ul>
      <li>Use <strong>WASD</strong> or <strong>Arrow Keys</strong> to move.</li>
      <li>Click to <strong>shoot</strong> enemies.</li>
      <li>Pick up **ammo cans** to reload (max 30 ammo).</li>
      <li>Avoid enemy hits to keep your **health** up.</li>
      <li>Your goal is to achieve the highest possible **score**!</li>
    </ul>
    <button id="start-game-button">Start Game</button>
  </div>
</div>
    <style>
/*Modal (tutorial) styling */
  .modal {
    display: none; /* Hidden by default */
    position: fixed; /* Stay in place */
    z-index: 10; /* Sit on top of the game canvas */
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.7); /* Black with opacity */
    justify-content: center;
    align-items: center;
  }

  .modal-content {
    background-color: #fefefe;
    padding: 20px;
    border: 1px solid #888;
    width: 80%; /* Could be responsive */
    max-width: 500px;
    color: black;
    text-align: left;
    border-radius: 10px;
  }

  .close-button {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
  }

  .close-button:hover,
  .close-button:focus {
    color: #000;
    text-decoration: none;
    cursor: pointer;
  }

  #start-game-button {
    margin-top: 15px;
    padding: 10px 20px;
    background-color: blue;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
</style>
    <script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const ammoCountEl = document.getElementById('ammo-count');
  const scoreCountEl = document.getElementById('score-count');
  const healthCountEl = document.getElementById('health-count');

  // Tutorial Modal elements
  const tutorialModal = document.getElementById('tutorial-modal');
  const closeButton = document.querySelector('.close-button');
  const startGameButton = document.getElementById('start-game-button');

  let player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    size: 20,
    color: 'blue',
    speed: 5,
    health: 100
  };

  let ammo = 10;
  let score = 0;
  const MAX_AMMO = 30;
  let bullets = [];
  let enemies = [];
  let reloadCans = [];
  const keys = {};
  let gameRunning = false; // Add a game state variable

  document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
  });
  document.addEventListener('keyup', (e) => {
    keys[e.key] = false;
  });

  canvas.addEventListener('click', shoot);

  // --- Modal Logic ---

  function showTutorial() {
    tutorialModal.style.display = 'flex'; // Use flex to center the modal content
    gameRunning = false;
  }

  function hideTutorialAndStartGame() {
    tutorialModal.style.display = 'none';
    gameRunning = true;
    requestAnimationFrame(gameLoop); // Start the game loop only after closing the tutorial
  }

  // Event listeners for modal buttons
  closeButton.addEventListener('click', hideTutorialAndStartGame);
  startGameButton.addEventListener('click', hideTutorialAndStartGame);

  // Close modal if user clicks outside of it (optional)
  window.addEventListener('click', (e) => {
    if (e.target == tutorialModal) {
      hideTutorialAndStartGame();
    }
  });

  // --- Game Functions (Place your existing game logic here) ---

  // Function to handle player movement
  function updatePlayerPosition() {
    if (!gameRunning) return; // Stop movement if game is not running
    // Movement logic (WASD/Arrows)
    if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
    if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

    // Boundary checks
    player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));
  }

  // Function to shoot
  function shoot(event) {
    if (!gameRunning || ammo <= 0) return; // Prevent shooting if game not running or no ammo

    const rect = canvas.getBoundingClientRect();
    const clickX = event.clientX - rect.left;
    const clickY = event.clientY - rect.top;

    const angle = Math.atan2(clickY - player.y, clickX - player.x);
    const speed = 7;
    bullets.push({
      x: player.x,
      y: player.y,
      size: 5,
      color: 'white',
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed
    });

    ammo--;
    updateStats();
  }

  // Function to update the stats display
  function updateStats() {
    ammoCountEl.textContent = ammo;
    scoreCountEl.textContent = score;
    healthCountEl.textContent = player.health;
  }

  // (Add your other game functions here: drawPlayer, updateBullets, createEnemy, etc.
  // Make sure to add `if (!gameRunning) return;` at the beginning of relevant functions if needed.)

  // Example placeholder for game loop and drawing functions
  function drawPlayer() {
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
    ctx.fill();
  }

  function gameLoop() {
    if (!gameRunning) return; // Stop the loop if game is not running

    ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear canvas

    updatePlayerPosition();
    drawPlayer();
    // Call other update/draw functions here (enemies, bullets, etc.)

    requestAnimationFrame(gameLoop); // Continue the loop
  }

  // Initialize: Show tutorial first, game starts after user interaction
  updateStats();
  showTutorial();
</script>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ammoCountEl = document.getElementById('ammo-count');
        const scoreCountEl = document.getElementById('score-count');
        const healthCountEl = document.getElementById('health-count');

        let player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 20,
            color: 'blue',
            speed: 5,
            health: 100
        };

        let ammo = 10;
        let score = 0;
        const MAX_AMMO = 30;

        let bullets = [];
        let enemies = [];
        let reloadCans = [];

        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('click', shoot);

        function shoot(event) {
            if (ammo > 0) {
                const angle = Math.atan2(event.clientY - canvas.getBoundingClientRect().top - player.y, event.clientX - canvas.getBoundingClientRect().left - player.x);
                const speed = 7;
                bullets.push({
                    x: player.x,
                    y: player.y,
                    size: 5,
                    color: 'green',
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed
                });
                ammo--;
                updateStats();
            }
        }

        function createEnemy() {
            const size = Math.random() * 10 + 15;
            const x = Math.random() < 0.5 ? 0 - size : canvas.width + size;
            const y = Math.random() * canvas.height;
            const speed = Math.random() * 2 + 1;
            enemies.push({
                x, y, size, color: 'red', speed
            });
        }

        function createReloadCan() {
            const size = 15;
            const x = Math.random() * (canvas.width - size * 2) + size;
            const y = Math.random() * (canvas.height - size * 2) + size;
            reloadCans.push({
                x, y, size, color: 'orange', value: 10
            });
        }

        function update() {
            // Player movement
            if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
            if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

            // Boundary checks for player
            if (player.x < player.size) player.x = player.size;
            if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
            if (player.y < player.size) player.y = player.size;
            if (player.y > canvas.height - player.size) player.y = canvas.height - player.size;

            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;
                // Remove bullets off-screen
                if (bullets[i].x < 0 || bullets[i].x > canvas.width || bullets[i].y < 0 || bullets[i].y > canvas.height) {
                    bullets.splice(i, 1);
                }
            }

            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                enemy.x += Math.cos(angle) * enemy.speed;
                enemy.y += Math.sin(angle) * enemy.speed;

                // Collision detection with player (simple distance check)
                const dist = Math.sqrt((player.x - enemy.x)**2 + (player.y - enemy.y)**2);
                if (dist < player.size + enemy.size) {
                    player.health -= 1; // Inflict damage
                    enemies.splice(i, 1); // Remove enemy on collision
                    updateStats();
                }
            }

            // Collision detection with bullets and enemies
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const dist = Math.sqrt((bullets[i].x - enemies[j].x)**2 + (bullets[i].y - enemies[j].y)**2);
                    if (dist < bullets[i].size + enemies[j].size) {
                        score += 10;
                        bullets.splice(i, 1); // Remove bullet
                        enemies.splice(j, 1); // Remove enemy
                        updateStats();
                        break; // Exit inner loop after collision
                    }
                }
            }

            // Collision detection with reload cans
            for (let i = reloadCans.length - 1; i >= 0; i--) {
                const can = reloadCans[i];
                const dist = Math.sqrt((player.x - can.x)**2 + (player.y - can.y)**2);
                if (dist < player.size + can.size) {
                    ammo = Math.min(MAX_AMMO, ammo + can.value);
                    reloadCans.splice(i, 1); // Remove can
                    updateStats();
                }
            }

            // Game over condition
            if (player.health <= 0) {
                alert('Game Over! Your score: ' + score);
                document.location.reload(); // or implement a restart function
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw player
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            // Draw bullets
            for (const bullet of bullets) {
                ctx.fillStyle = bullet.color;
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw enemies
            for (const enemy of enemies) {
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x - enemy.size / 2, enemy.y - enemy.size / 2, enemy.size, enemy.size);
            }

            // Draw reload cans
            for (const can of reloadCans) {
                ctx.fillStyle = can.color;
                ctx.fillRect(can.x - can.size / 2, can.y - can.size / 2, can.size, can.size);
                ctx.fillStyle = 'black';
                ctx.fillText('+10', can.x - can.size / 2, can.y - can.size / 2 - 5);
            }
        }

        function updateStats() {
            ammoCountEl.textContent = ammo;
            scoreCountEl.textContent = score;
            healthCountEl.textContent = player.health;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Initial spawns
        setInterval(createEnemy, 1500);
        setInterval(createReloadCan, 5000);
        updateStats();
        gameLoop();
    </script>
</body>
</html>
