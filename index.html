<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paintball Game</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #333; color: white; font-family: Arial, sans-serif; }
        canvas { background-color: #f50000; border: 2px solid black; }
        #game-container { text-align: center; position: relative; }
        #game-stats { margin-bottom: 10px; font-size: 18px; }
        .modal { display: flex; /* Changed from none to flex for start screen */ position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
        .modal-content { background-color: #fefefe; padding: 20px; border: 1px solid #888; width: 80%; max-width: 500px; color: black; border-radius: 10px; }
        .character-option { display: inline-block; padding: 10px; cursor: pointer; border: 2px solid transparent; }
        .character-option:hover { border: 2px solid blue; }
        button { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="game-stats">Health: <span id="hp">100</span> | Enemies: <span id="enemy-count">0</span></div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
</div>

<!-- Start/Character Modal -->
<div id="startModal" class="modal">
    <div class="modal-content">
        <h2>Select Character & Start</h2>
        <div id="char-selection">
            <div class="character-option" onclick="selectChar('blue')" style="background-color: #add8e6;">Blue Defender</div>
            <div class="character-option" onclick="selectChar('yellow')" style="background-color: #ffffcc;">Yellow Scout</div>
        </div>
        <br>
        <button id="start-game-button" onclick="startGame()">Start Game</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hpSpan = document.getElementById('hp');
    const enemySpan = document.getElementById('enemy-count');
    const startModal = document.getElementById('startModal');

    let player = { x: 400, y: 250, size: 20, color: 'blue', hp: 100, maxHp: 100, speed: 5 };
    let enemies = [];
    let healthPacks = [];
    let gameRunning = false;
    let keys = {};

    // --- CHARACTER SELECTION ---
    function selectChar(color) {
        player.color = color;
        player.maxHp = (color === 'yellow') ? 80 : 120; // Different stats
        player.speed = (color === 'yellow') ? 7 : 5;
        player.hp = player.maxHp;
    }

    function startGame() {
        startModal.style.display = 'none';
        gameRunning = true;
        spawnEnemy();
        gameLoop();
    }

    // --- INPUTS ---
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    // --- GAME MECHANICS ---
    function spawnEnemy() {
        enemies.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: 15,
            color: 'white',
            speed: 1 + Math.random() * 2
        });
        enemySpan.innerText = enemies.length;
    }

    function spawnHealthPack() {
        if (Math.random() < 0.05) { // 5% chance per frame
            healthPacks.push({
                x: Math.random() * (canvas.width - 20),
                y: Math.random() * (canvas.height - 20),
                size: 15
            });
        }
    }

    function drawBar(x, y, width, height, value, max, color) {
        ctx.fillStyle = '#555'; // Background
        ctx.fillRect(x, y, width, height);
        ctx.fillStyle = color; // Foreground
        ctx.fillRect(x, y, (value / max) * width, height);
    }

    // --- CORE LOOP ---
    function gameLoop() {
        if (!gameRunning) return;

        // Clear
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Movement
        if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
        if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
        if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
        if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

        // Boundary
        player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
        player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

        // Draw Player
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.size, player.size);
        drawBar(player.x - 5, player.y - 10, player.size + 10, 5, player.hp, player.maxHp, 'lime');

        // Draw Health Packs
        spawnHealthPack();
        healthPacks.forEach((hp, index) => {
            ctx.fillStyle = 'lime';
            ctx.fillRect(hp.x, hp.y, hp.size, hp.size);
            // Collect
            if (player.x < hp.x + hp.size && player.x + player.size > hp.x &&
                player.y < hp.y + hp.size && player.y + player.size > hp.y) {
                player.hp = Math.min(player.maxHp, player.hp + 20);
                healthPacks.splice(index, 1);
            }
        });

        // Update Enemies
        enemies.forEach((enemy, index) => {
            // Move towards player
            let dx = player.x - enemy.x;
            let dy = player.y - enemy.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            enemy.x += (dx / dist) * enemy.speed;
            enemy.y += (dy / dist) * enemy.speed;

            // Draw Enemy
            ctx.fillStyle = enemy.color;
            ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

            // Collision
            if (player.x < enemy.x + enemy.size && player.x + player.size > enemy.x &&
                player.y < enemy.y + enemy.size && player.y + player.size > enemy.y) {
                player.hp -= 0.5; // Damage per frame
                if (player.hp <= 0) {
                    player.hp = 0;
                    gameRunning = false;
                    alert("Game Over! Enemies: " + enemies.length);
                    location.reload(); // Simple restart
                }
            }
        });

        hpSpan.innerText = Math.floor(player.hp);
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
