<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Froggy Eats Game</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #222; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        canvas { background-color: #0077be; border: 4px solid #004d00; border-radius: 10px; cursor: crosshair; }
        #game-container { text-align: center; position: relative; }
        #game-stats { margin-bottom: 10px; font-size: 20px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
        .modal { display: flex; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background-color: #e0f2f1; padding: 30px; border-radius: 15px; color: #333; text-align: center; border: 4px solid #4CAF50; }
        .character-option { display: inline-block; padding: 15px; margin: 10px; cursor: pointer; border: 3px solid #333; border-radius: 50%; width: 60px; height: 60px; }
        .character-option:hover { transform: scale(1.1); }
        button { padding: 10px 25px; background-color: #4CAF50; color: white; border: none; cursor: pointer; font-size: 16px; border-radius: 5px; margin-top: 15px; }
    </style>
</head>
<body>

        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <div id="startModal" class="modal">
        <div class="modal-content">

            <div id="char-selection">

            </div>
            <p>Use Mouse to move, 'F' to eat flies!</p>
        </div>
    </div>
