<html lang="en">

    <title>Froggy Eats Game</title>

        canvas { background-color: #0077be; border: 4px solid #004d00; border-radius: 10px; cursor: crosshair; }
        #game-container { text-align: center; position: relative; }

        .character-option { display: inline-block; padding: 15px; margin: 10px; cursor: pointer; border: 3px solid #333; border-radius: 50%; width: 40px; height: 40px; }
        button { padding: 10px 25px; background-color: #4CAF50; color: white; border: none; cursor: pointer; font-size: 16px; border-radius: 5px; margin-top: 15px; }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; width: 80%; }
        #leaderboard { text-align: left; margin-top: 15px; max-height: 150px; overflow-y: auto; font-size: 14px;}
    </style>
</head>
